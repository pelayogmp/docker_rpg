secrets:
  postgres_passwd:
    file: postgres-password.secret

services:
  postgres:
    image: postgres:latest
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: redmine
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_passwd
      POSTGRES_DB: redmine
    secrets:
      - postgres_passwd
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redmine -d redmine"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  redmine:
    image: redmine:latest
    container_name: redmine
    restart: unless-stopped
    environment:
      REDMINE_DB_POSTGRES: postgres
      REDMINE_DB_DATABASE: redmine
      REDMINE_DB_USERNAME: redmine
      REDMINE_DB_PASSWORD_FILE: /run/secrets/postgres_passwd
    secrets:
      - postgres_passwd
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
    volumes:
      - redmine-data:/usr/src/redmine/files
      - gitolite_home:/var/lib/gitolite:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s


